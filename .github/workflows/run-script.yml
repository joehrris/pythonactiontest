name: AI Morning Briefing

on:
  workflow_dispatch: # Allows manual triggering and cron-job.org

jobs:
  briefing-job:
    runs-on: ubuntu-latest

    steps:
      - name: 1. Grab the code
        uses: actions/checkout@v4

      - name: 2. Install Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11' 

      - name: 3. Install Required Libraries
        run: pip install requests beautifulsoup4 google-generativeai

      - name: 4. Execute the AI Briefing Script
        env:
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: python ai-briefing.py
