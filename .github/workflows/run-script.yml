name: AI Morning Briefing

on:
  workflow_dispatch: # Allows cron-job.org to trigger this via the GitHub API

jobs:
  briefing-job:
    runs-on: ubuntu-latest

    steps:
      - name: 1. Grab the code
        uses: actions/checkout@v4

      - name: 2. Install Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11' 

      - name: 3. Install Required Libraries
        run: pip install requests beautifulsoup4 google-generativeai google-api-python-client google-auth-httplib2 google-auth

      - name: 4. Run AI Briefing Script
        env:
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          CALENDAR_SERVICE_ACCOUNT: ${{ secrets.CALENDER_SERVICE_ACCOUNT }}
          GOOGLE_CALENDAR_ID: ${{ secrets.GOOGLE_CALENDAR_ID }}
        run: python ai-briefing.py
