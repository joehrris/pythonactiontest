name: The Ruthless Deal Sniper

on:
    branches:
      - main
  workflow_dispatch: # This lets us test it manually

jobs:
  sniper-job:
    runs-on: ubuntu-latest

    steps:
      - name: 1. Grab the code
        uses: actions/checkout@v4

      - name: 2. Install Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11' 

      - name: 3. Install Scraping Libraries
        run: pip install requests beautifulsoup4

      - name: 4. Execute the Sniper Script
        env:
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: python sniper.py
